<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وسام فرسان التحدي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .certificate-container { background: white; border: 15px solid #f8fafc; border-radius: 10px; position: relative; }
        .gold-border { border: 5px double #d4af37; padding: 40px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-3xl font-black text-slate-800 mb-6">مرحباً بك يا بطل</h1>
        <input type="text" id="student-name" placeholder="اكتب اسمك الثلاثي" 
               class="w-full border-2 p-4 rounded-xl mb-6 text-center text-xl outline-none focus:border-yellow-600">
        <button onclick="generate()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl text-xl transition hover:bg-black">استلام الوسام ✨</button>
    </div>

    <div id="award-screen" class="hidden w-full max-w-2xl">
        <div id="capture-area" class="certificate-container shadow-2xl">
            <div class="gold-border text-center">
                <div class="text-6xl mb-4">🏆</div>
                <h2 class="text-xl font-bold text-slate-400 uppercase tracking-widest">شهادة فخر واعتزاز</h2>
                <div class="my-10">
                    <p class="text-slate-500 text-lg">نمنح هذا الوسام للطالبـ/ـة:</p>
                    <h3 id="display-name" class="text-4xl font-black text-slate-900 mt-2 border-b-4 border-yellow-500 inline-block px-4"></h3>
                </div>
                <p class="text-xl text-slate-700 leading-relaxed font-bold mb-6">
                    لقد أثبتَّ أن شغفك بالعلم أقوى من كل الظروف. شكراً لالتزامك وتفوقك في التعلم عن بعد.
                </p>
                <div class="bg-yellow-50 p-4 rounded-lg italic text-slate-800 font-bold border-r-4 border-yellow-600">
                    "خلف كل غيمة شتاء.. شمسٌ تأبى إلا أن تشرق."
                </div>
                <div class="mt-10 flex justify-between text-slate-400 font-bold text-sm">
                    <span>تحريراً في: 2026</span>
                    <span class="text-yellow-600 font-black text-lg">بصمة تميز 🎖️</span>
                </div>
            </div>
        </div>

        <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
            <button onclick="downloadImg()" class="bg-yellow-600 hover:bg-yellow-700 text-white font-black py-4 px-8 rounded-2xl flex items-center justify-center gap-2 shadow-lg transition transform active:scale-95">
                📥 تحميل الشهادة كصورة
            </button>
            <button onclick="share()" class="bg-blue-800 hover:bg-blue-900 text-white font-black py-4 px-8 rounded-2xl flex items-center justify-center gap-2 shadow-lg transition transform active:scale-95">
                🔗 مشاركة الرابط
            </button>
        </div>
        <p class="text-white/50 text-center mt-6 text-sm cursor-pointer underline" onclick="location.reload()">إنشاء شهادة أخرى</p>
    </div>

    <script>
        function generate() {
            const name = document.getElementById('student-name').value;
            if(!name) return alert("لطفاً اكتب اسمك");
            document.getElementById('display-name').innerText = name;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('award-screen').classList.remove('hidden');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        // دالة التحميل الحقيقي للصورة
        function downloadImg() {
            const area = document.getElementById('capture-area');
            html2canvas(area, {
                scale: 2, // لزيادة جودة الصورة
                useCORS: true,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const base64image = canvas.toDataURL("image/png");
                const anchor = document.createElement('a');
                anchor.setAttribute("href", base64image);
                anchor.setAttribute("download", "وسام_التحدي_" + document.getElementById('display-name').innerText + ".png");
                anchor.click();
            });
        }

        function share() {
            if (navigator.share) {
                navigator.share({
                    title: 'وسامي من معلمتي',
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("تم نسخ الرابط بنجاح!");
            }
        }
    </script>
</body>
</html>
