<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالتك اليوم من المعلمة أنوار خطيب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #0f172a; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .certificate-container { 
            background: white; 
            border: 12px solid #f8fafc; 
            position: relative; 
            width: 100%; 
            max-width: 600px; 
        }
        .gold-border { 
            border: 5px double #d4af37; 
            padding: 40px; 
            margin: 5px; 
        }
        .hope-box { 
            border-right: 5px solid #ca8a04; 
            background: #fefce8; 
            padding: 20px; 
            border-radius: 0 15px 15px 0; 
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <div class="text-7xl mb-6">🛡️</div>
        <h1 class="text-3xl font-black text-slate-800 mb-2">رسالة اليوم!</h1>
        <p class="text-slate-500 mb-8 font-bold">رغم الصعاب.. العلم يجمعنا</p>
        
        <input type="text" id="student-name" placeholder="اكتب اسمك الثلاثي هنا..." 
               class="w-full border-2 border-slate-200 p-4 rounded-2xl mb-6 text-center text-xl outline-none focus:border-yellow-600 shadow-inner transition-all">
        
        <button onclick="generate()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl text-xl hover:bg-black shadow-xl transition-all transform active:scale-95">
        استلام الرسالة الخاصة بك ✨
        </button>
    </div>

    <div id="award-screen" class="hidden w-full flex flex-col items-center animate-in fade-in zoom-in duration-700">
        
        <div id="capture-area" class="certificate-container shadow-2xl overflow-hidden">
            <div class="gold-border text-center">
                <div class="text-6xl mb-4">🏆</div>
                <h2 class="text-2xl font-bold text-slate-400 uppercase tracking-widest mb-2">وسام اعتزاز</h2>
                
                <div class="my-10">
                    <p class="text-slate-500 text-xl">أنت رائع/ـة يا ـ:</p>
                    <h3 id="display-name" class="text-4xl font-black text-slate-900 mt-3 border-b-4 border-yellow-500 inline-block px-4 pb-1"></h3>
                </div>

                <div class="text-right space-y-6">
                    <p class="text-xl text-slate-700 leading-relaxed font-bold">
                        فخورة بالتزامك وتفوقك في التعلم عن بعد رغم كل الظروف.
                    </p>
                    
                    <div class="hope-box italic text-slate-800 font-black text-lg shadow-sm">
                        "تذكر/ي دائماً أنّ خلف كلّ ظلام هناك شمس مشرقة، وأن أملك اليوم هو الجسر الذي سيعبر بك إلى أحلامك غداً."
                    </div>
                </div>

                <div class="mt-12 pt-8 border-t border-slate-100 flex justify-between items-center font-black">
                    <div class="text-slate-400 text-sm">التاريخ: مارس 2026</div>
                    <div class="text-yellow-600 text-xl flex items-center gap-2">
                        <span>معلمتك الفخورة بك:أنوار خطيب</span>
                        <span>🎖️</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-10 flex flex-wrap gap-4 justify-center w-full px-4">
            <button onclick="downloadImg()" class="bg-yellow-600 hover:bg-yellow-700 text-white font-black py-4 px-10 rounded-2xl flex items-center gap-3 shadow-2xl transition-all transform active:scale-90 text-lg">
                <span>📥</span> تحميل الرسالة (PNG)
            </button>
            
            <button onclick="share()" class="bg-blue-800 hover:bg-blue-900 text-white font-black py-4 px-10 rounded-2xl flex items-center gap-3 shadow-2xl transition-all transform active:scale-90 text-lg">
                <span>🔗</span> مشاركة الرابط
            </button>
        </div>

        <button onclick="location.reload()" class="mt-8 text-white/60 hover:text-white underline font-bold transition-all">إنشاء وسام جديد لزميل آخر</button>
    </div>

    <script>
        function generate() {
            const name = document.getElementById('student-name').value;
            if(!name || name.trim().length < 2) {
                alert("لطفاً، اكتب اسمك الثلاثي ليكون الوسام مكتملاً!");
                return;
            }
            
            document.getElementById('display-name').innerText = name;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('award-screen').classList.remove('hidden');
            
            // احتفال القصاصات الملونة
            confetti({
                particleCount: 200,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#d4af37', '#1e293b', '#ffffff']
            });
        }

        // دالة تحويل الكود لصورة وتحميلها
        function downloadImg() {
            const area = document.getElementById('capture-area');
            const studentName = document.getElementById('display-name').innerText;
            
            html2canvas(area, { 
                scale: 3, // جودة عالية جداً للطباعة
                backgroundColor: "#ffffff",
                logging: false,
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `وسام_فرسان_التحدي_${studentName}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }

        function share() {
            const shareData = {
                title: 'رسالة اليوم',
                text: 'لقد حصلت على رسالة من معلمتي! احصل على رسالتك أيضاً.',
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("تم نسخ رابط الموقع بنجاح! يمكنك الآن إرساله لأي شخص.");
            }
        }
    </script>
</body>
</html>
